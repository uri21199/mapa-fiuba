      .lbl-sm { font:500 9px system-ui,sans-serif; fill:#555; text-anchor:middle; dominant-baseline:central; pointer-events:none; }
      .lbl-lg { font:700 13px system-ui,sans-serif; fill:#333; text-anchor:middle; dominant-baseline:central; pointer-events:none; }
      .espacio { cursor:pointer; }
      .espacio:hover rect { filter:brightness(.92); }
    </style>
  </defs>

  <rect width="1000" height="780" fill="#C8C4BF"/>
  <rect x="40" y="30" width="920" height="720" rx="2" fill="#DEDBD7" stroke="#888" stroke-width="5"/>

